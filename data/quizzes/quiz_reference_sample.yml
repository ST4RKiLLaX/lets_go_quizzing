meta:
  name: Quiz Reference Sample
  author: Lets Go Quizzing
  default_timer: 30
  option_label_style: letters
rounds:
  - name: Phase 1 Basics
    questions:
      - id: q1
        type: choice
        text: What is the capital of Australia?
        explanation: Canberra is the capital city of Australia.
        options:
          - Sydney
          - Melbourne
          - Canberra
          - Perth
        answer: 2
      - id: q2
        type: input
        text: "Complete: 'Is this the real life? Is this just __________'"
        explanation: The lyric is from Queen's Bohemian Rhapsody.
        answer:
          - fantasy
          - fantsy
          - Phantasy
      - id: q3
        type: true_false
        text: Lightning is hotter than the surface of the sun.
        explanation: A lightning bolt can briefly be much hotter than the sun's surface.
        answer: true
      - id: q4
        type: poll
        text: Which snack should the host bring to the next quiz night?
        explanation: Poll questions collect opinions and do not affect scores.
        options:
          - Popcorn
          - Nachos
          - Cookies
          - Fruit
  - name: Phase 2 Structured Inputs
    questions:
      - id: q5
        type: multi_select
        text: Which of these are prime numbers?
        explanation: 2 and 5 are prime. 4 and 9 are composite numbers.
        options:
          - "2"
          - "4"
          - "5"
          - "9"
        answer:
          - 0
          - 2
      - id: q6
        type: slider
        text: How many players are on a standard soccer team on the field at once?
        explanation: A standard team has 11 players on the field, including the goalkeeper.
        min: 5
        max: 15
        step: 1
        answer: 11
  - name: Phase 3 Text Aggregation
    questions:
      - id: q7
        type: open_ended
        text: In one sentence, why do you like pub quizzes?
        explanation: Open-ended questions allow longer text answers without being scored.
      - id: q8
        type: word_cloud
        text: Describe your current mood in one word!
        explanation: Word clouds aggregate repeated answers into a visual display.
  - name: Phase 4 Custom Visual Types (Reorder)
    questions:
      - id: q9
        type: reorder
        text: Order these historical events from earliest to most recent.
        explanation: The Declaration of Independence (1776), French Revolution (1789), and Moon Landing (1969).
        options:
          - French Revolution
          - Moon Landing
          - Declaration of Independence
        answer:
          - 2
          - 0
          - 1
